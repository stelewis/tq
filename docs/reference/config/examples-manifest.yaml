examples:
  quickstart_minimal: |
    [tool.tq]
    [[tool.tq.targets]]
    name = "app"
    package = "your_package"
    source_root = "src"
    test_root = "tests"

  configuration_minimal: |
    [tool.tq]
    [[tool.tq.targets]]
    name = "app"
    package = "your_package"
    source_root = "src"
    test_root = "tests"

  configuration_typical: |
    [tool.tq]
    ignore_init_modules = true
    max_test_file_non_blank_lines = 600
    qualifier_strategy = "allowlist"
    allowed_qualifiers = ["regression", "config", "fixtures_golden"]

    [[tool.tq.targets]]
    name = "app"
    package = "your_package"
    source_root = "src"
    test_root = "tests"

    [[tool.tq.targets]]
    name = "scripts"
    package = "scripts"
    source_root = "."
    test_root = "tests"
