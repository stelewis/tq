name: Question
description: Ask for usage help or clarification
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include command output, configuration snippets, and environment details.
    validations:
      required: false
