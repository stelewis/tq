changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - semver-major
    - title: Features
      labels:
        - feat
        - enhancement
        - semver-minor
    - title: Bug Fixes
      labels:
        - fix
        - bug
    - title: Documentation
      labels:
        - docs
        - documentation
    - title: CI and Tooling
      labels:
        - ci
        - chore
        - dependencies
    - title: Other Changes
      labels:
        - "*"
