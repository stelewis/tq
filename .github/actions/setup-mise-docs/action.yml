name: Setup mise docs toolchain
description: Configure mise and install docs dependencies

runs:
  using: composite
  steps:
    - name: Set up mise
      uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0

    - name: Install docs dependencies
      shell: bash
      run: mise exec -- npm ci
