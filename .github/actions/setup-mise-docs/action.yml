name: Setup mise docs toolchain
description: Configure mise and install docs dependencies

runs:
  using: composite
  steps:
    - name: Set up mise
      uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2

    - name: Install docs dependencies
      shell: bash
      run: mise exec -- npm ci
