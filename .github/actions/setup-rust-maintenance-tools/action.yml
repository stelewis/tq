name: Setup Rust maintenance tools
description: Install pinned Rust maintenance CLIs used by repository workflows

inputs:
  install-stable-toolchain:
    description: Install the stable Rust toolchain for tools that are bootstrapped outside the product MSRV
    required: false
    default: "false"
  install-cargo-outdated:
    description: Install cargo-outdated
    required: false
    default: "true"
  cargo-outdated-version:
    description: cargo-outdated release to install with the active Rust toolchain
    required: false
    default: "0.17.0"
  install-cargo-audit:
    description: Install cargo-audit from the pinned RustSec revision
    required: false
    default: "false"
  cargo-audit-rev:
    description: RustSec repository revision to install cargo-audit from
    required: false
    default: "c9f8506963a0050a7b53ce4d3781baa9485c7a89"  # pragma: allowlist secret
  install-cargo-deny:
    description: Install cargo-deny from the pinned stable release
    required: false
    default: "false"
  cargo-deny-version:
    description: cargo-deny release to install with the stable toolchain
    required: false
    default: "0.19.0"

runs:
  using: composite
  steps:
    - name: Install stable Rust toolchain
      if: ${{ inputs.install-stable-toolchain == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        rustup toolchain install stable --profile minimal

    - name: Determine maintenance tool cache key
      if: ${{ inputs.install-cargo-outdated == 'true' || inputs.install-cargo-audit == 'true' || inputs.install-cargo-deny == 'true' }}
      id: toolchain
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ inputs.install-stable-toolchain }}" == "true" ]]; then
          release="$(rustc +stable -Vv | sed -n 's/^release: //p' | head -n 1)"
          if [[ -z "$release" ]]; then
            echo "Could not determine the stable Rust release"
            exit 1
          fi

          echo "cache-suffix=stable-${release}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        release="$(rustc -Vv | sed -n 's/^release: //p' | head -n 1)"
        if [[ -z "$release" ]]; then
          echo "Could not determine the active Rust release"
          exit 1
        fi

        echo "cache-suffix=active-${release}" >> "$GITHUB_OUTPUT"

    - name: Compose maintenance tool cache keys
      if: ${{ inputs.install-cargo-outdated == 'true' || inputs.install-cargo-audit == 'true' || inputs.install-cargo-deny == 'true' }}
      id: cache-key
      shell: bash
      run: |
        set -euo pipefail

        cache_key_prefix="rust-maintenance-tools-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.cache-suffix }}-outdated-${{ inputs.install-cargo-outdated }}-${{ inputs.cargo-outdated-version }}-audit-${{ inputs.install-cargo-audit }}-${{ inputs.cargo-audit-rev }}-deny-${{ inputs.install-cargo-deny }}-${{ inputs.cargo-deny-version }}"

        echo "exact=${cache_key_prefix}-${{ hashFiles('.github/actions/setup-rust-maintenance-tools/action.yml') }}" >> "$GITHUB_OUTPUT"
        echo "prefix=${cache_key_prefix}-" >> "$GITHUB_OUTPUT"

    - name: Restore cached maintenance tool binaries
      if: ${{ inputs.install-cargo-outdated == 'true' || inputs.install-cargo-audit == 'true' || inputs.install-cargo-deny == 'true' }}
      id: maintenance-cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cargo-maintenance-tools
        key: ${{ steps.cache-key.outputs.exact }}
        restore-keys: |
          ${{ steps.cache-key.outputs.prefix }}

    - name: Add maintenance tools to PATH
      if: ${{ inputs.install-cargo-outdated == 'true' || inputs.install-cargo-audit == 'true' || inputs.install-cargo-deny == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        echo "$HOME/.cargo-maintenance-tools/bin" >> "$GITHUB_PATH"

    - name: Install cargo-outdated
      if: ${{ inputs.install-cargo-outdated == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        tool_root="$HOME/.cargo-maintenance-tools"
        if [[ -x "$tool_root/bin/cargo-outdated" ]]; then
          exit 0
        fi

        if [[ "${{ inputs.install-stable-toolchain }}" == "true" ]]; then
          cargo +stable install --root "$tool_root" --locked "cargo-outdated@${{ inputs.cargo-outdated-version }}"
          exit 0
        fi

        cargo install --root "$tool_root" --locked "cargo-outdated@${{ inputs.cargo-outdated-version }}"

    - name: Install cargo-audit
      if: ${{ inputs.install-cargo-audit == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        tool_root="$HOME/.cargo-maintenance-tools"
        if [[ -x "$tool_root/bin/cargo-audit" ]]; then
          exit 0
        fi

        cargo +stable install \
          --root "$tool_root" \
          --git https://github.com/RustSec/rustsec.git \
          --rev "${{ inputs.cargo-audit-rev }}" \
          --locked \
          cargo-audit

    - name: Install cargo-deny
      if: ${{ inputs.install-cargo-deny == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        tool_root="$HOME/.cargo-maintenance-tools"
        if [[ -x "$tool_root/bin/cargo-deny" ]]; then
          exit 0
        fi

        cargo +stable install --root "$tool_root" --locked "cargo-deny@${{ inputs.cargo-deny-version }}"

    - name: Save maintenance tool cache
      if: ${{ (inputs.install-cargo-outdated == 'true' || inputs.install-cargo-audit == 'true' || inputs.install-cargo-deny == 'true') && steps.maintenance-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cargo-maintenance-tools
        key: ${{ steps.cache-key.outputs.exact }}
