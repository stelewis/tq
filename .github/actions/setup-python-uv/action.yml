name: Setup Python and uv
description: Configure Python environment with uv

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.14"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync
