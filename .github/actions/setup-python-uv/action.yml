name: Setup Python and uv
description: Configure Python environment with uv

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.14"
  sync-project:
    description: Whether to install the repository environment with uv sync
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true

    - name: Install dependencies
      if: ${{ inputs.sync-project == 'true' }}
      shell: bash
      run: uv sync --locked
