name: Setup Python and uv
description: Configure Python environment with uv

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.14"
  sync-project:
    description: Whether to install the repository environment with uv sync
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true

    - name: Install dependencies
      if: ${{ inputs.sync-project == 'true' }}
      shell: bash
      run: uv sync --locked
