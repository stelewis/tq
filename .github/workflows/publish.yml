name: Publish

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 3
    environment: ${{ vars.PYPI_ENVIRONMENT || 'pypi' }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Clean previous build artifacts
        run: rm -rf dist

      - name: Validate release tag format
        if: ${{ github.event_name == 'push' }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if ! [[ "$TAG_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG_NAME' is not supported. Use SemVer tags like 0.4.0"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Verify artifact contents policy
        run: uv run python scripts/release/verify_artifact_contents.py

      - name: Validate package metadata
        run: uv run --isolated --no-project --with twine -- twine check dist/*

      - name: Smoke check wheel and sdist entrypoints
        run: |
          wheel_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No wheel artifact found in dist/"
            exit 1
          fi
          sdist_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "$sdist_path" ]; then
            echo "No source distribution artifact found in dist/"
            exit 1
          fi
          uv run --isolated --no-project --with "$wheel_path" -- tq --help
          uv run --isolated --no-project --with "$wheel_path" -- tqlint --help
          uv run --isolated --no-project --with "$wheel_path" -- tq check --help
          uv run --isolated --no-project --with "$sdist_path" -- tq --help
          uv run --isolated --no-project --with "$sdist_path" -- tqlint --help

      - name: Smoke check fixture from built wheel
        run: |
          wheel_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No wheel artifact found in dist/"
            exit 1
          fi
          mkdir -p tmp/release-smoke/src/demo tmp/release-smoke/tests/demo
          cat > tmp/release-smoke/pyproject.toml <<'TOML'
          [project]
          name = "demo"
          version = "0.0.0"
          requires-python = ">=3.11"

          [tool.tq]
          package = "demo"
          source_root = "src"
          test_root = "tests"
          ignore_init_modules = true
          max_test_file_non_blank_lines = 600
          qualifier_strategy = "allowlist"
          allowed_qualifiers = ["regression"]
          TOML
          cat > tmp/release-smoke/src/demo/core.py <<'PY'
          def add(a: int, b: int) -> int:
              return a + b
          PY
          cat > tmp/release-smoke/tests/demo/test_core.py <<'PY'
          from demo.core import add


          def test_add() -> None:
              assert add(1, 1) == 2
          PY
          (
            cd tmp/release-smoke
            uv run --isolated --no-project --with "$wheel_path" -- tq check
          )

      - name: Generate artifact attestation
        if: ${{ github.event_name == 'push' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Verify artifact attestations
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          for artifact in dist/*.whl dist/*.tar.gz; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
              --deny-self-hosted-runners
          done

      - name: Publish
        if: ${{ github.event_name == 'push' }}
        run: uv publish

      - name: Post-publish smoke (uvx)
        if: ${{ github.event_name == 'push' }}
        run: |
          for attempt in 1 2 3 4 5; do
            if uvx tqlint --help; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Package not visible via uvx after retries"
              exit 1
            fi
            sleep 20
          done
          (
            cd tmp/release-smoke
            uvx tqlint check
          )

      - name: Consumer provenance check (PyPI wheel)
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF#refs/tags/}"
          mkdir -p tmp/pypi-verify

          for attempt in 1 2 3 4 5; do
            if python -m pip download --no-deps "tqlint==$TAG_NAME" -d tmp/pypi-verify; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Could not download tqlint==$TAG_NAME from PyPI after retries"
              exit 1
            fi
            sleep 20
          done

          wheel_path="$(find tmp/pypi-verify -maxdepth 1 -type f -name "tqlint-${TAG_NAME}-*.whl" | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No wheel found for tqlint==$TAG_NAME"
            exit 1
          fi

          gh attestation verify "$wheel_path" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
            --deny-self-hosted-runners

      - name: Generate release checksums
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail

          sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS

      - name: Create GitHub release
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF#refs/tags/}"

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release '$TAG_NAME' already exists"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$TAG_NAME" \
            --generate-notes
