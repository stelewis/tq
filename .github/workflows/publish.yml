name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Resolve release candidate
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_publish: ${{ steps.release.outputs.should_publish }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      source_run_id: ${{ steps.release.outputs.source_run_id }}
    steps:
      - name: Verify source CI run produced validated release artifacts
        id: artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          run_id='${{ github.event.workflow_run.id }}'
          artifact_count="$(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts" \
              --jq '[.artifacts[] | select(.name == "validated-dist" and .expired == false)] | length'
          )"

          if [ "$artifact_count" -eq 0 ]; then
            echo "Source CI run $run_id has no validated-dist artifact; skipping publish."
            echo "has_validated_dist=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$artifact_count" -ne 1 ]; then
            echo "Expected exactly one validated-dist artifact for CI run $run_id, found $artifact_count"
            exit 1
          fi

          echo "has_validated_dist=true" >> "$GITHUB_OUTPUT"

      - name: Resolve SemVer tag for successful CI run
        id: release
        if: ${{ steps.artifacts.outputs.has_validated_dist == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          head_sha='${{ github.event.workflow_run.head_sha }}'

          mapfile -t release_tags < <(
            gh api --paginate "repos/$GITHUB_REPOSITORY/tags?per_page=100" \
              --jq '.[] | select(.commit.sha == "'"$head_sha"'" and (.name | test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))) | .name'
          )

          if [ "${#release_tags[@]}" -eq 0 ]; then
            echo "No SemVer tag points at $head_sha; skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${#release_tags[@]}" -gt 1 ]; then
            printf 'Multiple SemVer tags point at %s: %s\n' "$head_sha" "${release_tags[*]}"
            exit 1
          fi

          release_tag="${release_tags[0]}"

          if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub release '$release_tag' already exists; skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "source_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish validated artifacts
    needs: prepare
    if: ${{ needs.prepare.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment: ${{ vars.PYPI_ENVIRONMENT || 'pypi' }}
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - name: Reset transient directories
        run: rm -rf dist tmp/release-smoke tmp/pypi-verify

      - name: Checkout tagged revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv
        with:
          sync-project: "false"

      - name: Download validated distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-dist
          path: dist
          repository: ${{ github.repository }}
          run-id: ${{ needs.prepare.outputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Verify downloaded release artifacts are present
        shell: bash
        run: |
          set -euo pipefail

          bash .github/scripts/verify-release-artifact-set.sh dist

      - name: Verify CI artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          for artifact in dist/*.whl dist/*.tar.gz; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
              --deny-self-hosted-runners
          done

      - name: Verify release policy
        run: cargo run -p tq-release --locked -- verify-release-policy --repo-root .

      - name: Verify artifact contents policy
        run: cargo run -p tq-release --locked -- verify-artifact-contents --dist-dir dist

      - name: Validate package metadata
        run: uv run --isolated --no-project --with twine -- twine check dist/*

      - name: Smoke check Linux wheel and sdist entrypoints
        shell: bash
        run: |
          set -euo pipefail

          wheel_path="$(find "$PWD/dist" -maxdepth 1 -type f \( -name '*manylinux*.whl' -o -name '*musllinux*.whl' \) | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No Linux wheel artifact found in dist/"
            exit 1
          fi
          sdist_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "$sdist_path" ]; then
            echo "No source distribution artifact found in dist/"
            exit 1
          fi
          uv run --isolated --no-project --with "$wheel_path" -- tq --help
          uv run --isolated --no-project --with "$wheel_path" -- tq check --help
          uv run --isolated --no-project --with "$sdist_path" -- tq --help
          uv run --isolated --no-project --with "$sdist_path" -- tq check --help

      - name: Smoke check fixture from Linux wheel
        shell: bash
        run: |
          set -euo pipefail

          wheel_path="$(find "$PWD/dist" -maxdepth 1 -type f \( -name '*manylinux*.whl' -o -name '*musllinux*.whl' \) | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No Linux wheel artifact found in dist/"
            exit 1
          fi
          rm -rf tmp/release-smoke
          mkdir -p tmp/release-smoke/src/demo tmp/release-smoke/tests/demo
          cat > tmp/release-smoke/pyproject.toml <<'TOML'
          [project]
          name = "demo"
          version = "0.0.0"
          requires-python = ">=3.11"

          [tool.tq]
          init_modules = "ignore"
          max_test_file_non_blank_lines = 600
          qualifier_strategy = "allowlist"
          allowed_qualifiers = ["regression"]

          [[tool.tq.targets]]
          name = "demo"
          package = "demo"
          source_root = "src"
          test_root = "tests"
          TOML
          cat > tmp/release-smoke/src/demo/core.py <<'PY'
          def add(a: int, b: int) -> int:
              return a + b
          PY
          cat > tmp/release-smoke/tests/demo/test_core.py <<'PY'
          from demo.core import add


          def test_add() -> None:
              assert add(1, 1) == 2
          PY
          (
            cd tmp/release-smoke
            uv run --isolated --no-project --with "$wheel_path" -- tq check
          )

      - name: Publish
        run: uv publish

      - name: Post-publish smoke (uvx)
        run: |
          for attempt in 1 2 3 4 5; do
            if uvx --from tqlint tq --help; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Package not visible via uvx after retries"
              exit 1
            fi
            sleep 20
          done
          (
            cd tmp/release-smoke
            uvx --from tqlint tq check
          )

      - name: Consumer provenance check (PyPI Linux wheel)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME='${{ needs.prepare.outputs.release_tag }}'
          rm -rf tmp/pypi-verify
          mkdir -p tmp/pypi-verify

          for attempt in 1 2 3 4 5; do
            rm -f tmp/pypi-verify/*

            if python -m pip download --no-deps --only-binary=:all: "tqlint==$TAG_NAME" -d tmp/pypi-verify; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Could not download wheel for tqlint==$TAG_NAME from PyPI after retries"
              exit 1
            fi

            sleep 20
          done

          wheel_path="$(find tmp/pypi-verify -maxdepth 1 -type f -name "tqlint-${TAG_NAME}-*.whl" | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No wheel found for tqlint==$TAG_NAME"
            exit 1
          fi

          wheel_name="$(basename "$wheel_path")"
          if [[ "$wheel_name" != *manylinux* && "$wheel_name" != *musllinux* ]]; then
            echo "Expected a Linux wheel from PyPI download, found '$wheel_name'"
            exit 1
          fi

          gh attestation verify "$wheel_path" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
            --deny-self-hosted-runners

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail

          sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME='${{ needs.prepare.outputs.release_tag }}'

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release '$TAG_NAME' already exists"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$TAG_NAME" \
            --generate-notes
