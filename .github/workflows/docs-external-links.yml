name: Docs External Links

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "README.md"
      - "docs/**/*.md"
  push:
    branches: [ "main" ]
    paths:
      - "README.md"
      - "docs/**/*.md"
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: External links (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore lychee cache
        id: restore-lychee-cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .lycheecache
          key: cache-lychee-${{ runner.os }}-${{ hashFiles('README.md', 'docs/**/*.md', '.lycheeignore', '.github/workflows/docs-external-links.yml') }}
          restore-keys: |
            cache-lychee-${{ runner.os }}-

      - name: Check external links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
          jobSummary: true
          args: >-
            --root-dir "${{ github.workspace }}"
            --no-progress
            --exclude-mail
            --cache
            --max-cache-age 1d
            --max-retries 2
            --retry-wait-time 2
            --timeout 20
            --accept 200,429
            --exclude-path docs/design/**
            --exclude-path docs/plans/**
            README.md
            docs/**/*.md

      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .lycheecache
          key: ${{ steps.restore-lychee-cache.outputs.cache-primary-key }}
