name: Frozen Pre-commit Policy

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
  push:
    branches: ["main"]
    paths:
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  enforce-frozen-pre-commit:
    name: Enforce frozen pre-commit SHAs
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate external pre-commit hook refs are SHA pinned
        shell: bash
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          require "yaml"

          config = YAML.safe_load(
            File.read(".pre-commit-config.yaml"),
            permitted_classes: [],
            aliases: false
          ) || {}

          violations = []

          config.fetch("repos", []).each do |repo_entry|
            repo = repo_entry["repo"]
            next if repo.nil? || repo == "local"

            rev = repo_entry["rev"]
            next if rev.is_a?(String) && rev.match?(/\A[a-f0-9]{40}\z/)

            violations << format(
              "Pre-commit repo %<repo>s must be pinned to a full 40-character commit SHA (found %<rev>p)",
              repo: repo,
              rev: rev
            )
          end

          if violations.empty?
            puts "All external pre-commit hooks are frozen to commit SHAs."
            exit 0
          end

          violations.each do |message|
            puts "::error file=.pre-commit-config.yaml::#{message}"
          end

          abort "One or more pre-commit hook references are not frozen to a full commit SHA."
          RUBY
