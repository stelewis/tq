name: CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "*.*.*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-messages:
    name: Commit messages (commitizen)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Check commit messages (pull_request)
        if: ${{ github.event_name == 'pull_request' }}
        run: uv run cz check --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Check commit messages (push)
        if: ${{ github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' }}
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          git fetch --no-tags origin "$BEFORE_SHA" || true

          if git rev-parse --verify --quiet "$BEFORE_SHA^{commit}" >/dev/null; then
            uv run cz check --rev-range "$BEFORE_SHA..$HEAD_SHA"
          else
            uv run cz check --use-default-range
          fi

  hygiene:
    name: Hygiene (pre-commit)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Hygiene hooks
        run: |
          uv run prek run trailing-whitespace --all-files
          uv run prek run end-of-file-fixer --all-files
          uv run prek run check-yaml --all-files
          uv run prek run check-added-large-files --all-files

  format:
    name: Format (cargo fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cargo fmt
        run: cargo fmt --all --check

  lint:
    name: Lint (cargo clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  docs-sync:
    name: Docs sync contracts
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Regenerate manifest-backed docs
        run: cargo run -p tq-docsgen --locked -- generate all

      - name: Ensure generated docs are committed
        run: |
          git diff --exit-code \
            docs/reference/cli.md \
            docs/reference/configuration.md \
            docs/guide/quickstart.md \
            docs/.vitepress/generated/rules-sidebar.ts \
            docs/reference/rules/index.md \
            docs/reference/rules/*.md

  docs-build:
    name: Docs build (VitePress)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup docs toolchain
        uses: ./.github/actions/setup-mise-docs

      - name: Build docs
        run: mise run docs-build

  tests:
    name: Tests (cargo)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cargo test
        run: cargo test --workspace --locked

  build:
    name: Build and packaging checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Verify release policy
        run: cargo run -p tq-release --locked -- verify-release-policy --repo-root .

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Build release CLI
        run: cargo build -p tq-cli --release --locked

      - name: Validate cargo package dry-run
        run: cargo package --workspace --locked

      - name: Build Python package artifacts
        run: uv build

      - name: Verify artifact contents policy
        run: cargo run -p tq-release --locked -- verify-artifact-contents --dist-dir dist

      - name: Smoke check built package entrypoints
        shell: bash
        run: |
          set -euo pipefail

          wheel_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No wheel artifact found in dist/"
            exit 1
          fi

          sdist_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "$sdist_path" ]; then
            echo "No source distribution artifact found in dist/"
            exit 1
          fi

          uv run --isolated --no-project --with "$wheel_path" -- tq --help
          uv run --isolated --no-project --with "$wheel_path" -- tq check --help
          uv run --isolated --no-project --with "$sdist_path" -- tq --help
          uv run --isolated --no-project --with "$sdist_path" -- tq check --help

      - name: Upload tag release candidates
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tag-release-candidate
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  tag-release-artifacts:
    name: Tag release artifact attestation
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download tag release candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tag-release-candidate
          path: dist

      - name: Verify downloaded release artifacts are present
        shell: bash
        run: |
          set -euo pipefail

          if ! compgen -G 'dist/*.whl' > /dev/null; then
            echo "No wheel artifact found in dist/"
            exit 1
          fi

          if ! compgen -G 'dist/*.tar.gz' > /dev/null; then
            echo "No source distribution artifact found in dist/"
            exit 1
          fi

      - name: Generate artifact attestations for validated distributions
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Upload validated distribution artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: validated-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  package-compatibility:
    name: Package compatibility (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Python package artifacts
        run: uv build

      - name: Smoke check built package entrypoints
        shell: bash
        run: |
          set -euo pipefail

          wheel_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No wheel artifact found in dist/"
            exit 1
          fi

          sdist_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "$sdist_path" ]; then
            echo "No source distribution artifact found in dist/"
            exit 1
          fi

          uv run --isolated --no-project --with "$wheel_path" -- tq --help
          uv run --isolated --no-project --with "$wheel_path" -- tq check --help
          uv run --isolated --no-project --with "$sdist_path" -- tq --help
          uv run --isolated --no-project --with "$sdist_path" -- tq check --help

  security:
    name: Security checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine dependency security scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          event_name='${{ github.event_name }}'
          zero_sha='0000000000000000000000000000000000000000'

          if [[ "$event_name" == "workflow_dispatch" ]]; then
            echo "rust_scan=true" >> "$GITHUB_OUTPUT"
            echo "docs_scan=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$event_name" == "pull_request" ]]; then
            base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
          elif [[ "$event_name" == "push" ]]; then
            base_sha='${{ github.event.before }}'
            head_sha='${{ github.sha }}'

            if [[ "$base_sha" == "$zero_sha" ]]; then
              echo "rust_scan=true" >> "$GITHUB_OUTPUT"
              echo "docs_scan=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "rust_scan=true" >> "$GITHUB_OUTPUT"
            echo "docs_scan=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          printf '%s\n' "$changed_files"

          rust_scan=false
          if printf '%s\n' "$changed_files" | grep -Eq '^(Cargo\.lock|Cargo\.toml|deny\.toml|crates/[^/]+/Cargo\.toml|\.github/workflows/(ci|rust-security-advisories)\.yml|\.github/actions/(setup-rust|setup-rust-security-tools|setup-rust-maintenance-tools)/action\.yml)$'; then
            rust_scan=true
          fi

          docs_scan=false
          if printf '%s\n' "$changed_files" | grep -Eq '^(package\.json|package-lock\.json|mise\.toml|\.github/workflows/(ci|docs-security)\.yml|\.github/actions/setup-mise-docs/action\.yml)$'; then
            docs_scan=true
          fi

          echo "rust_scan=$rust_scan" >> "$GITHUB_OUTPUT"
          echo "docs_scan=$docs_scan" >> "$GITHUB_OUTPUT"

      - name: Setup Rust toolchain
        if: ${{ steps.scope.outputs.rust_scan == 'true' }}
        uses: ./.github/actions/setup-rust

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Setup Rust security tools
        if: ${{ steps.scope.outputs.rust_scan == 'true' }}
        uses: ./.github/actions/setup-rust-security-tools

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Detect secrets (baseline)
        run: uv run detect-secrets-hook --baseline .detect-secrets.baseline

      - name: Cargo audit
        if: ${{ steps.scope.outputs.rust_scan == 'true' }}
        run: cargo audit

      - name: Cargo deny
        if: ${{ steps.scope.outputs.rust_scan == 'true' }}
        run: cargo deny check

      - name: Setup docs toolchain
        if: ${{ steps.scope.outputs.docs_scan == 'true' }}
        uses: ./.github/actions/setup-mise-docs
        with:
          install-dependencies: "false"

      - name: npm audit (docs toolchain)
        if: ${{ steps.scope.outputs.docs_scan == 'true' }}
        run: mise exec -- npm audit --package-lock-only

      - name: Summarize gated dependency scans
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Dependency security scope"
            echo
            echo "- Rust dependency security scans: ${{ steps.scope.outputs.rust_scan }}"
            echo "- Docs dependency security scans: ${{ steps.scope.outputs.docs_scan }}"
            echo
            echo "Secret scanning remains unconditional in main CI."
          } >> "$GITHUB_STEP_SUMMARY"
