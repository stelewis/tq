name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-messages:
    name: Commit messages (commitizen)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Check commit messages (pull_request)
        if: ${{ github.event_name == 'pull_request' }}
        run: uv run cz check --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Check commit messages (push)
        if: ${{ github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' }}
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          git fetch --no-tags origin "$BEFORE_SHA" || true

          if git rev-parse --verify --quiet "$BEFORE_SHA^{commit}" >/dev/null; then
            uv run cz check --rev-range "$BEFORE_SHA..$HEAD_SHA"
          else
            uv run cz check --use-default-range
          fi

  hygiene:
    name: Hygiene (pre-commit)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Hygiene hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --all-files trailing-whitespace end-of-file-fixer check-yaml check-added-large-files

  format:
    name: Format (cargo fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cargo fmt
        run: cargo fmt --all --check

  lint:
    name: Lint (cargo clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  docs-sync:
    name: Docs sync contracts
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Regenerate manifest-backed docs
        run: |
          uv run python scripts/docs/generate_rules_docs.py
          uv run python scripts/docs/generate_cli_docs.py
          uv run python scripts/docs/generate_config_examples.py

      - name: Ensure generated docs are committed
        run: |
          git diff --exit-code \
            docs/reference/cli.md \
            docs/reference/configuration.md \
            docs/guide/quickstart.md \
            docs/.vitepress/generated/rules-sidebar.ts \
            docs/reference/rules/index.md \
            docs/reference/rules/*.md

  docs-build:
    name: Docs build (VitePress)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Setup docs toolchain
        uses: ./.github/actions/setup-mise-docs

      - name: Build docs
        run: mise run docs-build

  tests:
    name: Tests (cargo)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cargo test
        run: cargo test --workspace --locked

  conformance:
    name: Conformance and determinism
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Run conformance harness
        run: cargo test -p tq-cli --test conformance_harness --locked -- --ignored --nocapture

  build:
    name: Build and manifest checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Build release CLI
        run: cargo build -p tq-cli --release --locked

      - name: Validate Cargo metadata
        run: cargo metadata --format-version 1 --locked >/dev/null

      - name: Smoke check CLI entrypoint
        run: cargo run -p tq-cli --locked -- check --help

  security:
    name: Security checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Setup Rust security tools
        uses: ./.github/actions/setup-rust-security-tools

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Detect secrets (baseline)
        run: uv run detect-secrets-hook --baseline .detect-secrets.baseline

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check

      - name: Setup docs toolchain
        uses: ./.github/actions/setup-mise-docs

      - name: npm audit (docs toolchain)
        run: mise exec -- npm audit
