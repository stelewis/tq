name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-messages:
    name: Commit messages (commitizen)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Check commit messages (pull_request)
        if: ${{ github.event_name == 'pull_request' }}
        run: uv run cz check --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Check commit messages (push)
        if: ${{ github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' }}
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          git fetch --no-tags origin "$BEFORE_SHA" || true

          if git rev-parse --verify --quiet "$BEFORE_SHA^{commit}" >/dev/null; then
            uv run cz check --rev-range "$BEFORE_SHA..$HEAD_SHA"
          else
            uv run cz check --use-default-range
          fi

  hygiene:
    name: Hygiene (pre-commit)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "Hygiene: trailing-whitespace"
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: trailing-whitespace --all-files

      - name: "Hygiene: end-of-file-fixer"
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: end-of-file-fixer --all-files

      - name: "Hygiene: check-yaml"
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: check-yaml --all-files

      - name: "Hygiene: check-added-large-files"
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: check-added-large-files --all-files

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Ruff format (check)
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check --output-format=github

  typecheck:
    name: Type check (ty)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Run ty check
        run: uv run ty check

  docs-sync:
    name: Docs sync contracts
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Regenerate manifest-backed docs
        run: |
          uv run python scripts/docs/generate_rules_docs.py
          uv run python scripts/docs/generate_cli_docs.py
          uv run python scripts/docs/generate_config_examples.py

      - name: Ensure generated docs are committed
        run: |
          git diff --exit-code \
            docs/reference/cli.md \
            docs/reference/configuration.md \
            docs/guide/quickstart.md \
            docs/.vitepress/generated/rules-sidebar.ts \
            docs/reference/rules/index.md \
            docs/reference/rules/*.md

  docs-build:
    name: Docs build (VitePress)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup docs toolchain
        uses: ./.github/actions/setup-mise-docs

      - name: Build docs
        run: mise run docs-build

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Test quality
        run: uv run tq check

      - name: Run tests
        run: uv run pytest -q

  python-matrix:
    name: Python matrix checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: tq check (text)
        run: uv run tq check

      - name: tq check (json snapshot)
        run: |
          mkdir -p tmp/ci
          uv run tq check --output-format json > "tmp/ci/tq-check-${{ matrix.python-version }}.json"

      - name: Upload tq json snapshot
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tq-check-json-${{ matrix.python-version }}
          path: tmp/ci/tq-check-${{ matrix.python-version }}.json

      - name: Run tests
        run: uv run pytest -q

  matrix-determinism:
    name: Matrix determinism (tq json)
    needs: python-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Download tq json snapshots
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: tq-check-json-*
          path: tmp/ci/tq-json

      - name: Compare snapshots
        shell: bash
        run: |
          mapfile -t snapshots < <(find tmp/ci/tq-json -type f -name '*.json' | sort)

          if [ "${#snapshots[@]}" -lt 2 ]; then
            echo "Expected at least two tq json snapshots for comparison"
            exit 1
          fi

          baseline="${snapshots[0]}"
          for candidate in "${snapshots[@]:1}"; do
            if ! cmp -s "$baseline" "$candidate"; then
              echo "Non-deterministic tq JSON output detected:"
              echo "  baseline:  $baseline"
              echo "  candidate: $candidate"
              diff -u "$baseline" "$candidate" || true
              exit 1
            fi
          done

  package:
    name: Package checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Clean previous build artifacts
        run: rm -rf dist

      - name: Build package
        run: uv build

      - name: Verify artifact contents policy
        run: uv run python scripts/release/verify_artifact_contents.py

      - name: Validate package metadata
        run: uv run --isolated --no-project --with twine -- twine check dist/*

      - name: Smoke check wheel entrypoints
        run: |
          uv run --isolated --no-project --with dist/*.whl -- tq --help
          uv run --isolated --no-project --with dist/*.whl -- tqlint --help
          uv run --isolated --no-project --with dist/*.whl -- tq check --help

      - name: Smoke check sdist entrypoint
        run: |
          uv run --isolated --no-project --with dist/*.tar.gz -- tq --help
          uv run --isolated --no-project --with dist/*.tar.gz -- tqlint --help

  integration-tests:
    name: Integration tests (pytest)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Run integration tests
        run: uv run pytest -q -m integration

  security:
    name: Security checks
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Detect secrets (baseline)
        run: uv run detect-secrets-hook --baseline .detect-secrets.baseline

      - name: Bandit
        run: uv run bandit --configfile pyproject.toml -r src

      - name: pip-audit
        run: uv run pip-audit

      - name: Setup docs toolchain
        uses: ./.github/actions/setup-mise-docs

      - name: npm audit (docs toolchain)
        run: mise exec -- npm audit
