name: CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "*.*.*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-messages:
    name: Commit messages (commitizen)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Check commit messages (pull_request)
        if: ${{ github.event_name == 'pull_request' }}
        run: uv run cz check --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Check commit messages (push)
        if: ${{ github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' }}
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          git fetch --no-tags origin "$BEFORE_SHA" || true

          if git rev-parse --verify --quiet "$BEFORE_SHA^{commit}" >/dev/null; then
            uv run cz check --rev-range "$BEFORE_SHA..$HEAD_SHA"
          else
            uv run cz check --use-default-range
          fi

  hygiene:
    name: Hygiene (pre-commit)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Hygiene hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --all-files trailing-whitespace end-of-file-fixer check-yaml check-added-large-files

  format:
    name: Format (cargo fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cargo fmt
        run: cargo fmt --all --check

  lint:
    name: Lint (cargo clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  docs-sync:
    name: Docs sync contracts
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Regenerate manifest-backed docs
        run: cargo run -p tq-docsgen --locked -- generate all

      - name: Ensure generated docs are committed
        run: |
          git diff --exit-code \
            docs/reference/cli.md \
            docs/reference/configuration.md \
            docs/guide/quickstart.md \
            docs/.vitepress/generated/rules-sidebar.ts \
            docs/reference/rules/index.md \
            docs/reference/rules/*.md

  docs-build:
    name: Docs build (VitePress)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup docs toolchain
        uses: ./.github/actions/setup-mise-docs

      - name: Build docs
        run: mise run docs-build

  tests:
    name: Tests (cargo)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cargo test
        run: cargo test --workspace --locked

  build:
    name: Build and packaging checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Verify Dependabot github-actions coverage
        run: cargo run -p tq-release --locked -- verify-dependabot --repo-root .

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Build release CLI
        run: cargo build -p tq-cli --release --locked

      - name: Validate cargo package dry-run
        run: cargo package --workspace --locked

      - name: Build Python package artifacts
        run: uv build

      - name: Verify artifact contents policy
        run: cargo run -p tq-release --locked -- verify-artifact-contents --dist-dir dist

      - name: Smoke check built package entrypoints
        shell: bash
        run: |
          set -euo pipefail

          wheel_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No wheel artifact found in dist/"
            exit 1
          fi

          sdist_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "$sdist_path" ]; then
            echo "No source distribution artifact found in dist/"
            exit 1
          fi

          uv run --isolated --no-project --with "$wheel_path" -- tq --help
          uv run --isolated --no-project --with "$wheel_path" -- tq check --help
          uv run --isolated --no-project --with "$sdist_path" -- tq --help
          uv run --isolated --no-project --with "$sdist_path" -- tq check --help

      - name: Generate artifact attestations for validated distributions
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Upload validated distribution artifacts
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: validated-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  package-compatibility:
    name: Package compatibility (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Python package artifacts
        run: uv build

      - name: Smoke check built package entrypoints
        shell: bash
        run: |
          set -euo pipefail

          wheel_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.whl' | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No wheel artifact found in dist/"
            exit 1
          fi

          sdist_path="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "$sdist_path" ]; then
            echo "No source distribution artifact found in dist/"
            exit 1
          fi

          uv run --isolated --no-project --with "$wheel_path" -- tq --help
          uv run --isolated --no-project --with "$wheel_path" -- tq check --help
          uv run --isolated --no-project --with "$sdist_path" -- tq --help
          uv run --isolated --no-project --with "$sdist_path" -- tq check --help

  security:
    name: Security checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Setup Rust security tools
        uses: ./.github/actions/setup-rust-security-tools

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Detect secrets (baseline)
        run: uv run detect-secrets-hook --baseline .detect-secrets.baseline

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check

      - name: Setup docs toolchain
        uses: ./.github/actions/setup-mise-docs

      - name: npm audit (docs toolchain)
        run: mise exec -- npm audit
