name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - Cargo.toml
      - Cargo.lock
      - crates/**/Cargo.toml
      - rust-toolchain.toml
      - pyproject.toml
      - uv.lock
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - Cargo.toml
      - Cargo.lock
      - crates/**/Cargo.toml
      - rust-toolchain.toml
      - pyproject.toml
      - uv.lock

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv
