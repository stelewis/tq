name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - pyproject.toml
      - uv.lock
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - pyproject.toml
      - uv.lock

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv
