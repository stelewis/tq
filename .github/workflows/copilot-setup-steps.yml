name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/actions/**
      - Cargo.toml
      - Cargo.lock
      - crates/**/Cargo.toml
      - rust-toolchain.toml
      - pyproject.toml
      - uv.lock
      - package.json
      - package-lock.json
      - mise.toml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/actions/**
      - Cargo.toml
      - Cargo.lock
      - crates/**/Cargo.toml
      - rust-toolchain.toml
      - pyproject.toml
      - uv.lock
      - package.json
      - package-lock.json
      - mise.toml

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Setup Python + uv + deps
        uses: ./.github/actions/setup-python-uv

      - name: Setup docs toolchain
        uses: ./.github/actions/setup-mise-docs
