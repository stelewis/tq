[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "MIT",
  "Unicode-3.0",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
deny = [
  { crate = "serde_yaml", reason = "deprecated upstream", use-instead = "workspace JSON manifests or a crate-local strict parser" },
  { crate = "serde_yml", reason = "unsound and unmaintained", use-instead = "workspace JSON manifests or a crate-local strict parser" },
  { crate = "serde_yaml_ng", reason = "workspace avoids general YAML parsers", use-instead = "workspace JSON manifests or a crate-local strict parser" },
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
