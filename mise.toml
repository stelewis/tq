[tools]
node = "25.9.0"

[tasks]
docs-bootstrap = "if [ ! -x node_modules/.bin/vitepress ]; then npm ci; fi"
docs-dev = "mise run docs-bootstrap && npm run docs:dev"
docs-generate = "npm run docs:generate"
docs-build = "mise run docs-bootstrap && npm run docs:build"
docs-preview = "mise run docs-bootstrap && npm run docs:preview"
release-build = "rm -rf dist && uv build --sdist && uv run --isolated --with 'maturin>=1.11,<2.0' -- maturin build --release --locked --manifest-path crates/tq-cli/Cargo.toml --bindings bin --out dist -i python"
