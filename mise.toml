[tools]
node = "25.7.0"

[tasks]
docs-dev = "npm run docs:dev"
docs-generate = "npm run docs:generate"
docs-build = "npm run docs:build"
docs-preview = "npm run docs:preview"
release-build = "rm -rf dist && uv build --sdist && uv run --isolated --with 'maturin[zig]>=1.11,<2.0' -- maturin build --release --locked --manifest-path crates/tq-cli/Cargo.toml --bindings bin --out dist -i python --compatibility pypi --zig"
