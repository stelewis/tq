default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.7
    hooks:
      - id: uv-lock

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".detect-secrets.baseline"]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [pre-push]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format the Rust workspace
        entry: cargo fmt --all
        language: system
        pass_filenames: false
        require_serial: true

      - id: cargo-clippy
        name: cargo clippy
        description: Lint the Rust workspace
        entry: cargo clippy --workspace --all-targets --locked -- -D warnings
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

      - id: cargo-test
        name: cargo test
        description: Test the Rust workspace
        entry: cargo test --workspace --locked
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
