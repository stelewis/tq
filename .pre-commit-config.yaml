default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_stages: [pre-commit]

repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0  # pragma: allowlist secret
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: e99c5b43aa41681e83d439e6ebf3c82d7f3f6426  # frozen: 0.11.6  # pragma: allowlist secret
    hooks:
      - id: uv-lock

  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # frozen: v8.30.1  # pragma: allowlist secret
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458  # frozen: v1.5.0  # pragma: allowlist secret
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".detect-secrets.baseline"]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: b5d5040f7980a5d2bce320d2a1ea1e04ac54b00c  # frozen: v4.13.10  # pragma: allowlist secret
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [pre-push]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format the Rust workspace
        entry: cargo fmt --all
        language: system
        pass_filenames: false
        require_serial: true

      - id: cargo-clippy
        name: cargo clippy
        description: Lint the Rust workspace
        entry: cargo clippy --workspace --all-targets --locked -- -D warnings
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

      - id: cargo-test
        name: cargo test
        description: Test the Rust workspace
        entry: cargo test --workspace --locked
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
